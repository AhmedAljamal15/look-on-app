name: virtual_tryon_app
description: "AI-powered virtual clothing try-on app. Snap a photo of any
  garment in-store and see it on you instantly."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  cached_network_image: ^3.4.1
  device_preview: ^1.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.4
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_dotenv: ^6.0.1
  equatable: ^2.0.5
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_storage: ^12.3.4
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^2.5.1
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.10+1
  fpdart: ^1.1.0
  gap: ^3.0.1
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  image: ^4.2.0
  image_picker: ^1.1.2
  logger: ^2.4.0
  lottie: ^3.1.3
  package_info_plus: ^10.1.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  photo_view: ^0.15.0
  share_plus: ^13.1.0
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  supabase_flutter: ^2.15.0
  uuid: ^4.5.1
  video_player: ^2.9.2
  connectivity_plus: ^7.2.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  

  # ---------- Testing ----------
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/splash/
    - .env





flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpeg"
